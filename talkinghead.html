<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="description" content="AR Lipsync — talk to your AR character with real-time lip movement" />
  <title>AR Lipsync Character</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

  <!-- Import map for Three.js bare module specifier resolution -->
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/",
      "meshoptimizer": "https://cdn.jsdelivr.net/npm/meshoptimizer@0.19.0/meshopt_decoder.module.js"
    }
  }
  </script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    :root {
      --blue:   #4f8eff;
      --purple: #7c5cff;
      --white:  #ffffff;
      --black:  #000000;
      --dark:   #080c20;
      --glass:  rgba(8, 12, 32, 0.82);
      --font:   'Inter', system-ui, -apple-system, sans-serif;
      --sb: env(safe-area-inset-bottom, 0px);
      --st: env(safe-area-inset-top,    0px);
    }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: radial-gradient(circle at center, #0a1128 0%, #030407 100%);
      font-family: var(--font);
      color: var(--white);
      touch-action: none;
      user-select: none; -webkit-user-select: none;
    }

    /* ── Canvas ──────────────────────────────────────────────────────────── */
    #canvas-wrap {
      position: fixed; inset: 0; z-index: 1;
    }
    #canvas-wrap canvas { width: 100% !important; height: 100% !important; display: block; }

    /* ── Loader ──────────────────────────────────────────────────────────── */
    #loader {
      position: fixed; inset: 0; z-index: 900;
      background: radial-gradient(circle at center, #0a1128 0%, #030407 100%);
      display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 24px;
    }
    .loader-logo {
      width: 150px;
      filter: drop-shadow(0 0 20px rgba(255,255,255,0.15));
      animation: pulse-glow 2s infinite alternate;
    }
    @keyframes pulse-glow {
      0% { filter: drop-shadow(0 0 10px rgba(0,255,213,0.2)); }
      100% { filter: drop-shadow(0 0 30px rgba(112,0,255,0.4)); }
    }
    .loader-bar-wrap {
      width: 240px; height: 4px; background: rgba(255,255,255,0.05); border-radius: 4px; overflow: hidden;
      box-shadow: inset 0 1px 3px rgba(0,0,0,0.5);
    }
    .loader-bar-fill {
      height: 100%; width: 0%; background: linear-gradient(90deg, #00ffd5, #7000ff);
      border-radius: 4px; transition: width 0.3s ease;
      box-shadow: 0 0 10px rgba(0,255,213,0.5);
    }
    #loader-status {
      font-size: 13px; color: #a0aabf; letter-spacing: 0.1em; min-height: 16px;
      font-weight: 500; text-transform: uppercase;
    }

    /* ── Top bar ─────────────────────────────────────────────────────────── */
    #top-bar {
      position: fixed; top: 0; left: 0; right: 0;
      z-index: 200; pointer-events: none;
      padding: calc(var(--st) + 14px) 20px 14px;
      display: flex; align-items: center; justify-content: space-between;
    }
    #ls-back-btn {
      pointer-events: auto;
      display: flex; align-items: center; gap: 6px;
      background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.15);
      backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
      border-radius: 100px; padding: 8px 14px;
      font-size: 13px; font-weight: 600; color: var(--white);
      cursor: pointer; min-height: 36px;
      transition: background 0.15s;
    }
    #ls-back-btn:active { background: rgba(255,255,255,0.2); }

    .top-title {
      font-size: 11px; font-weight: 700; letter-spacing: 0.18em;
      color: var(--blue); text-transform: uppercase;
    }

    #ls-status-badge {
      pointer-events: none;
      display: flex; align-items: center; gap: 6px;
      background: rgba(8,12,32,0.75); border: 1px solid rgba(255,255,255,0.12);
      backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
      border-radius: 100px; padding: 6px 12px;
      font-size: 11px; font-weight: 600; letter-spacing: 0.06em;
      transition: opacity 0.3s;
    }
    .status-dot { width: 7px; height: 7px; border-radius: 50%; background: #888; flex-shrink: 0; }
    .status-dot.idle      { background: #4caf50; }
    .status-dot.listening { background: #ff9800; animation: pulse-dot 1s ease-in-out infinite; }
    .status-dot.thinking  { background: #9c27b0; animation: pulse-dot 1.2s ease-in-out infinite; }
    .status-dot.speaking  { background: var(--blue); animation: pulse-dot 0.8s ease-in-out infinite; }
    @keyframes pulse-dot { 0%,100%{opacity:1} 50%{opacity:0.35} }

    /* ── START AR button ─────────────────────────────────────────────────── */
    #ls-start-btn {
      position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
      z-index: 200;
      padding: 20px 60px;
      background: rgba(255,255,255,0.03); color: #ffffff;
      border: 1px solid rgba(255,255,255,0.1); border-radius: 100px;
      font-family: var(--font); font-size: 16px; font-weight: 700; letter-spacing: 0.2em;
      cursor: pointer; min-height: 60px; white-space: nowrap;
      backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
      box-shadow: 0 15px 35px rgba(0,0,0,0.4), inset 0 0 0 1px rgba(255,255,255,0.05);
      transition: all 0.4s ease;
      text-shadow: 0 2px 10px rgba(0,0,0,0.5);
    }
    #ls-start-btn::before {
      content: ""; position: absolute; top: 0; left: -100%; width: 100%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
      transition: all 0.6s ease; z-index: 1; border-radius: 100px;
    }
    #ls-start-btn:hover { 
      transform: translate(-50%, -50%) scale(1.05); 
      border-color: rgba(255,255,255,0.3);
      box-shadow: 0 20px 40px rgba(0,255,213,0.15), 0 0 20px rgba(112,0,255,0.2);
    }
    #ls-start-btn:hover::before { left: 100%; }
    #ls-start-btn:active { transform: translate(-50%, -50%) scale(0.95); }
    #ls-start-btn.hidden { display: none !important; }

    /* ── AR Reticle ──────────────────────────────────────────────────────── */
    #ls-reticle {
      position: fixed; bottom: 28%; left: 50%; transform: translateX(-50%);
      width: 72px; height: 72px;
      border: 2px solid rgba(255,255,255,0.85); border-radius: 50%;
      box-shadow: 0 0 0 1px rgba(255,255,255,0.25), inset 0 0 0 1px rgba(255,255,255,0.15);
      pointer-events: none; z-index: 50;
      animation: reticle-pulse 1.6s ease-in-out infinite;
      display: none;
    }
    @keyframes reticle-pulse {
      0%,100%{ opacity:0.85; transform:translateX(-50%) scale(1); }
      50%     { opacity:0.5;  transform:translateX(-50%) scale(1.08); }
    }

    /* ── Scan prompt ─────────────────────────────────────────────────────── */
    #ls-scan-prompt {
      position: fixed; top: calc(var(--st) + 80px); left: 50%; transform: translateX(-50%);
      z-index: 200; pointer-events: none;
      padding: 10px 20px; border-radius: 100px;
      background: rgba(0,0,0,0.6); border: 1px solid rgba(255,255,255,0.12);
      backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
      font-size: 13px; font-weight: 500; letter-spacing: 0.04em;
      display: none;
    }

    /* ── Tap prompt (tap-to-place) ───────────────────────────────────────── */
    #ls-tap-prompt {
      position: fixed; bottom: calc(var(--sb) + 90px); left: 50%; transform: translateX(-50%);
      z-index: 200; pointer-events: none;
      display: none; flex-direction: column; align-items: center; gap: 16px;
      animation: float 2.5s ease-in-out infinite;
    }
    @keyframes float { 0%,100%{transform:translateX(-50%) translateY(0)} 50%{transform:translateX(-50%) translateY(-10px)} }
    .tap-ring {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
      border: 1px solid rgba(255,255,255,0.4); border-radius: 50%;
      animation: tap-ripple 2s ease-out infinite;
    }
    .tap-ring-1 { width:80px; height:80px; }
    .tap-ring-2 { width:110px; height:110px; animation-delay:0.5s; }
    @keyframes tap-ripple {
      0%   { opacity:0.6; transform:translate(-50%,-50%) scale(0.8); }
      100% { opacity:0;   transform:translate(-50%,-50%) scale(1.4); }
    }
    .tap-icon { width:64px; height:64px; display:flex; align-items:center; justify-content:center; position:relative; z-index:1; }
    .tap-label {
      font-size: 11px; font-weight: 700; letter-spacing: 0.2em;
      text-shadow: 0 2px 8px rgba(0,0,0,0.8);
      margin-top: 44px; position: relative; z-index: 1;
    }

    /* ── Chat UI ─────────────────────────────────────────────────────────── */
    #chat-ui {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 200;
      padding: 0 16px calc(var(--sb) + 16px);
      display: none; flex-direction: column; gap: 12px; align-items: center;
    }

    #ls-transcript {
      width: 100%; max-width: 420px;
      background: rgba(10, 15, 30, 0.7); border: 1px solid rgba(0, 255, 213, 0.2);
      backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
      border-radius: 16px; padding: 14px 16px;
      font-size: 14px; line-height: 1.65; color: rgba(255,255,255,0.95);
      min-height: 56px; text-align: left;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5), inset 0 0 10px rgba(0, 255, 213, 0.05);
    }

    .chat-row {
      width: 100%; max-width: 420px;
      display: flex; align-items: center; gap: 10px;
    }

    #ls-mic-btn {
      flex-shrink: 0;
      width: 56px; height: 56px; border-radius: 50%;
      background: linear-gradient(135deg, rgba(0,255,213,0.1), rgba(112,0,255,0.1)); 
      border: 1px solid rgba(0,255,213,0.4);
      display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 3px;
      cursor: pointer; box-shadow: 0 0 15px rgba(0,255,213,0.3);
      transition: all 0.3s ease;
      min-width: 44px; min-height: 44px;
    }
    #ls-mic-btn:hover {
      box-shadow: 0 0 25px rgba(0,255,213,0.6);
      transform: scale(1.05);
      background: linear-gradient(135deg, rgba(0,255,213,0.2), rgba(112,0,255,0.2));
    }
    #ls-mic-btn:active { transform: scale(0.93); }
    #ls-mic-btn.listening {
      animation: mic-pulse 1.2s ease-in-out infinite;
      border-color: #ff0055;
      box-shadow: 0 0 20px rgba(255,0,85,0.6);
    }
    @keyframes mic-pulse {
      0%   { box-shadow: 0 0 0 0   rgba(255,0,85,0.6); }
      50%  { box-shadow: 0 0 0 18px rgba(255,0,85,0);   }
      100% { box-shadow: 0 0 0 0   rgba(255,0,85,0);    }
    }
    #ls-mic-label { font-size: 7px; font-weight: 700; letter-spacing: 0.12em; color: var(--white); }

    #ls-text-input {
      flex: 1;
      background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.15);
      backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
      border-radius: 100px; padding: 14px 18px;
      font-family: var(--font); font-size: 14px; color: var(--white);
      outline: none; min-height: 50px;
      transition: border-color 0.3s ease, box-shadow 0.3s ease;
    }
    #ls-text-input::placeholder { color: rgba(255,255,255,0.35); }
    #ls-text-input:focus { 
      border-color: rgba(112,0,255,0.5); 
      box-shadow: 0 0 15px rgba(112,0,255,0.2);
    }

    #ls-send-btn {
      flex-shrink: 0;
      width: 50px; height: 50px; border-radius: 50%;
      background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.15);
      backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; color: var(--white);
      transition: all 0.3s ease;
      min-width: 44px; min-height: 44px;
    }
    #ls-send-btn:hover {
      background: rgba(255,255,255,0.1);
      border-color: rgba(0,255,213,0.4);
      box-shadow: 0 0 15px rgba(0,255,213,0.2);
    }
    #ls-send-btn:active { transform: scale(0.93); background: rgba(0,255,213,0.3); }

    #ls-stop-btn {
      display: none;
      background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2);
      border-radius: 100px; padding: 8px 20px;
      font-size: 12px; font-weight: 700; letter-spacing: 0.1em; color: var(--white);
      cursor: pointer; backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
      transition: background 0.15s;
    }
    #ls-stop-btn.visible { display: block; }
    #ls-stop-btn:active { background: rgba(255,255,255,0.2); }

    /* ── Toast ───────────────────────────────────────────────────────────── */
    #ls-toast {
      position: fixed; top: calc(var(--st) + 80px); left: 50%; transform: translateX(-50%);
      z-index: 600;
      background: rgba(30,30,30,0.92); border: 1px solid rgba(255,255,255,0.1);
      backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      border-radius: 100px; padding: 10px 22px;
      font-size: 13px; color: var(--white); white-space: nowrap;
      opacity: 0; pointer-events: none; transition: opacity 0.3s;
    }
    #ls-toast.show { opacity: 1; }

    /* ── Scale Controls ──────────────────────────────────────────────────── */
    #scale-controls {
      position: fixed; right: 16px; bottom: calc(var(--sb) + 180px);
      z-index: 200; display: none; flex-direction: column; gap: 10px; align-items: center;
    }
    #scale-controls.visible { display: flex; }
    .scale-btn {
      width: 48px; height: 48px; border-radius: 50%;
      background: rgba(8,12,32,0.82); border: 1.5px solid rgba(255,255,255,0.2);
      backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      display: flex; align-items: center; justify-content: center;
      color: var(--white); font-size: 22px; font-weight: 300;
      cursor: pointer; box-shadow: 0 4px 16px rgba(0,0,0,0.4);
      transition: background 0.15s, transform 0.1s;
      min-width: 44px; min-height: 44px;
    }
    .scale-btn:active { transform: scale(0.9); background: rgba(79,142,255,0.3); }
    #scale-display {
      font-size: 10px; font-weight: 700; letter-spacing: 0.1em;
      color: rgba(255,255,255,0.5); text-align: center;
    }

    /* ── Logs button ──────────────────────────────────────────────────────── */
    #logs-btn {
      pointer-events: auto;
      display: flex; align-items: center; gap: 5px;
      background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15);
      backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
      border-radius: 100px; padding: 6px 12px;
      font-size: 11px; font-weight: 700; letter-spacing: 0.1em; color: rgba(255,255,255,0.7);
      cursor: pointer; min-height: 36px; font-family: var(--font);
      transition: background 0.15s, color 0.15s;
    }
    #logs-btn:hover { background: rgba(79,142,255,0.2); color: var(--white); }
    #logs-btn.active { background: rgba(79,142,255,0.3); color: var(--blue); border-color: rgba(79,142,255,0.4); }

    /* ── Logs Panel ───────────────────────────────────────────────────────── */
    #logs-panel {
      position: fixed; top: 0; right: 0; bottom: 0;
      width: min(360px, 100vw); z-index: 800;
      background: rgba(6,10,24,0.97); border-left: 1px solid rgba(255,255,255,0.1);
      backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      display: flex; flex-direction: column;
      transform: translateX(100%); transition: transform 0.28s cubic-bezier(0.4,0,0.2,1);
      pointer-events: none;
    }
    #logs-panel.open {
      transform: translateX(0); pointer-events: auto;
    }
    #logs-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 16px 12px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      flex-shrink: 0;
    }
    #logs-title {
      font-size: 11px; font-weight: 700; letter-spacing: 0.2em;
      color: var(--blue); text-transform: uppercase;
    }
    #logs-clear-btn {
      font-size: 10px; font-weight: 600; letter-spacing: 0.1em;
      color: rgba(255,255,255,0.4); background: none; border: none;
      cursor: pointer; font-family: var(--font); padding: 4px 8px;
      border-radius: 6px; transition: color 0.15s, background 0.15s;
    }
    #logs-clear-btn:hover { color: var(--white); background: rgba(255,255,255,0.08); }
    #logs-entries {
      flex: 1; overflow-y: auto; padding: 10px 12px;
      display: flex; flex-direction: column; gap: 6px;
    }
    #logs-entries::-webkit-scrollbar { width: 4px; }
    #logs-entries::-webkit-scrollbar-track { background: transparent; }
    #logs-entries::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 2px; }
    .log-entry {
      display: grid; grid-template-columns: auto 1fr auto;
      align-items: baseline; gap: 8px;
      padding: 7px 10px; border-radius: 8px;
      background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.06);
      font-size: 11.5px; line-height: 1.4;
    }
    .log-icon { font-size: 13px; }
    .log-msg { color: rgba(255,255,255,0.85); word-break: break-word; }
    .log-time { font-size: 10px; color: rgba(255,255,255,0.3); white-space: nowrap; font-variant-numeric: tabular-nums; }
    .log-entry.ev-user   { background: rgba(79,142,255,0.08); border-color: rgba(79,142,255,0.15); }
    .log-entry.ev-gemini { background: rgba(124,92,255,0.08); border-color: rgba(124,92,255,0.15); }
    .log-entry.ev-speech { background: rgba(76,175,80,0.08);  border-color: rgba(76,175,80,0.15);  }
    .log-entry.ev-lipsync{ background: rgba(255,152,0,0.08);  border-color: rgba(255,152,0,0.15);  }
    .log-entry.ev-error  { background: rgba(255,82,82,0.08);  border-color: rgba(255,82,82,0.15);  }
    .log-entry.ev-info   { background: rgba(255,255,255,0.04); }
    #logs-summary {
      padding: 10px 14px 14px;
      border-top: 1px solid rgba(255,255,255,0.08);
      flex-shrink: 0;
    }
    #logs-summary-text {
      font-size: 10px; color: rgba(255,255,255,0.35); line-height: 1.7;
      font-variant-numeric: tabular-nums;
    }

    /* ── Presentation HTML Icons (DOM Overlay, always visible in AR) ─────── */
    .pres-icon {
      position: fixed;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      cursor: pointer;
      z-index: 999;
      pointer-events: auto;
      /* centering via transform set inline */
      transform: translate(-50%, -50%) scale(1);
    }
    .pres-icon img {
      width: 64px;
      height: 64px;
      border-radius: 16px;
      background: rgba(255,255,255,0.12);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 2px solid rgba(255,255,255,0.3);
      box-shadow: 0 4px 24px rgba(0,0,0,0.4), 0 0 0 0 rgba(79,142,255,0.6);
      transition: box-shadow 0.3s, transform 0.2s;
      padding: 8px;
      object-fit: contain;
    }
    .pres-icon:active img, .pres-icon--active img {
      box-shadow: 0 0 0 4px rgba(79,142,255,0.8), 0 4px 24px rgba(0,0,0,0.5);
      transform: scale(1.12);
    }
    .pres-icon-label {
      font-size: 11px;
      font-weight: 700;
      color: #fff;
      background: rgba(10,20,50,0.75);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 100px;
      padding: 3px 10px;
      white-space: nowrap;
      letter-spacing: 0.5px;
      text-shadow: 0 1px 4px rgba(0,0,0,0.6);
    }

    /* ── Hidden helper ───────────────────────────────────────────────────── */
    .hidden { display: none !important; }
  </style>
</head>
<body>

  <!-- Canvas -->
  <div id="canvas-wrap"></div>

  <!-- Loader -->
  <div id="loader">
    <img src="assets/images/logo.png" class="loader-logo" alt="ARTech Logo" />
    <div class="loader-bar-wrap"><div class="loader-bar-fill" id="ls-bar"></div></div>
    <div id="loader-status">Initializing…</div>
  </div>

  <!-- Top bar -->
  <div id="top-bar">
    <button id="ls-back-btn">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
      BACK
    </button>
    <span class="top-title"><img src="assets/images/logo.png" alt="ARTech" style="height: 18px; filter: drop-shadow(0 0 10px rgba(255,255,255,0.2));" /></span>
    <div style="display:flex;align-items:center;gap:8px;pointer-events:auto;">
      <button id="mode-btn" style="background: rgba(255,255,255,0.05); border: 1px solid rgba(0,255,213,0.3); border-radius: 100px; padding: 6px 12px; font-size: 11px; font-weight: 700; color: #fff; cursor: pointer; backdrop-filter: blur(8px); box-shadow: 0 0 10px rgba(0,255,213,0.1); transition: all 0.3s ease;">Mode: AI</button>
      <button id="lang-btn" style="background: rgba(255,255,255,0.05); border: 1px solid rgba(112,0,255,0.3); border-radius: 100px; padding: 6px 12px; font-size: 11px; font-weight: 700; color: #fff; cursor: pointer; backdrop-filter: blur(8px); box-shadow: 0 0 10px rgba(112,0,255,0.1); transition: all 0.3s ease;">English</button>
      <button id="logs-btn" title="Show timing logs" style="display:flex;align-items:center;gap:4px;background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.15); border-radius: 100px; padding: 6px 12px; font-size: 11px; font-weight: 700; color: #fff; cursor: pointer; backdrop-filter: blur(8px);">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="8" y1="8" x2="16" y2="8"/><line x1="8" y1="12" x2="16" y2="12"/><line x1="8" y1="16" x2="12" y2="16"/></svg>
        LOGS
      </button>
      <div id="ls-status-badge">
        <div class="status-dot" id="ls-dot"></div>
        <span id="ls-status-text">Loading…</span>
      </div>
    </div>
  </div>

  <!-- Logs Panel -->
  <div id="logs-panel">
    <div id="logs-header">
      <span id="logs-title">⏱ Timing Logs</span>
      <button id="logs-clear-btn">CLEAR</button>
    </div>
    <div id="logs-entries"></div>
    <div id="logs-summary">
      <div id="logs-summary-text">No events yet.</div>
    </div>
  </div>

  <!-- START AR button -->
  <button id="ls-start-btn" class="hidden"><span style="position: relative; z-index: 2;">START</span></button>

  <!-- Reticle -->
  <div id="ls-reticle"></div>

  <!-- Scan prompt -->
  <div id="ls-scan-prompt">Move your device to scan the floor…</div>

  <!-- Tap prompt -->
  <div id="ls-tap-prompt">
    <div class="tap-ring tap-ring-1"></div>
    <div class="tap-ring tap-ring-2"></div>
    <div class="tap-icon">
      <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M9 11.5V6a2 2 0 0 1 4 0v3.5"/>
        <path d="M13 9.5a2 2 0 0 1 4 0V14"/>
        <path d="M17 11.5a2 2 0 0 1 4 0v3c0 3.314-2.686 6-6 6h-1.5a6 6 0 0 1-5.477-3.547l-2.185-4.37A2 2 0 0 1 9 10.5"/>
      </svg>
    </div>
    <div class="tap-label">TAP TO PLACE</div>
  </div>

  <!-- Chat UI -->
  <div id="chat-ui">
    <div id="ls-transcript">Tap the mic and say something…</div>
    <div class="chat-row">
      <button id="ls-mic-btn" aria-label="Speak">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/>
          <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
          <line x1="12" y1="19" x2="12" y2="22"/>
        </svg>
        <span id="ls-mic-label">SPEAK</span>
      </button>
      <input id="ls-text-input" type="text" placeholder="Or type here…" autocomplete="off" autocorrect="off" spellcheck="false" />
      <button id="ls-send-btn" aria-label="Send">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
      </button>
    </div>
    <button id="ls-stop-btn">■ STOP</button>
  </div>

  <!-- Toast -->
  <div id="ls-toast"></div>

  <!-- Scale Controls (shown after character is placed) -->
  <div id="scale-controls">
    <button class="scale-btn" id="scale-up-btn" aria-label="Scale up">＋</button>
    <div id="scale-display">SIZE</div>
    <button class="scale-btn" id="scale-down-btn" aria-label="Scale down">－</button>
  </div>

  <!-- Presentation Details Panel (Glassmorphism) -->
  <div id="presentation-panel" style="display: none; position: fixed; right: 20px; top: 50%; transform: translateY(-50%); width: 300px; padding: 25px; background: rgba(15, 25, 45, 0.7); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border: 1px solid rgba(255,255,255,0.15); border-radius: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.4); color: white; z-index: 100; pointer-events: auto; opacity: 0; transition: opacity 0.4s ease, transform 0.4s ease;">
    <button id="presentation-close" style="position: absolute; top: 15px; right: 15px; background: none; border: none; color: rgba(255,255,255,0.6); cursor: pointer; font-size: 20px;">&times;</button>
    <h3 id="presentation-title" style="margin: 0 0 15px 0; font-size: 20px; color: #4F8EFF; font-weight: 700;">عنوان الخدمة</h3>
    <p id="presentation-desc" style="margin: 0; font-size: 14px; line-height: 1.6; color: rgba(255,255,255,0.9);">هنا سيتم عرض تفاصيل الخدمة أو الأيقونة التي تم النقر عليها في بيئة الواقع المعزز.</p>
  </div>

  <!-- Config must load before setup -->
  <script src="config.js"></script>
  <script src="presentation_data.js?v=3"></script>
  <script type="module" src="lipsync/talkingheadSetup.js?v=19"></script>
</body>
</html>
